<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><rect y='0' width='36' height='12' fill='%23AE1C28'/><rect y='12' width='36' height='12' fill='%23FFF'/><rect y='24' width='36' height='12' fill='%2321468B'/></svg>">
<title>Meldpunt Ambtenaren — Wil jij je recht halen?</title>
<meta name="description" content="Wij helpen je om de daders verantwoordelijk te houden. Meld ambtenaren die burgers benadelen. Anoniem of openbaar.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #111827;
  --bg3: #1e293b;
  --surface: rgba(30,41,59,.65);
  --glass: rgba(30,41,59,.45);
  --glass-bd: rgba(148,163,184,.15);
  --tx: #f1f5f9;
  --tx2: #94a3b8;
  --tx3: #64748b;
  --accent: #ef4444;
  --accent2: #dc2626;
  --accent-soft: rgba(239,68,68,.12);
  --blue: #3b82f6;
  --blue-soft: rgba(59,130,246,.12);
  --green: #22c55e;
  --green-soft: rgba(34,197,94,.12);
  --yellow: #eab308;
  --yellow-soft: rgba(234,179,8,.12);
  --purple: #a855f7;
  --purple-soft: rgba(168,85,247,.12);
  --r: 14px;
  --rs: 8px;
  --font: 'DM Sans', system-ui, sans-serif;
  --max-w: 1080px;
  --tr: .2s cubic-bezier(.4,0,.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--font); background: var(--bg); color: var(--tx); line-height: 1.6; min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* CUSTOM SCROLLBAR */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(148,163,184,.25); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,.45); }
@supports (scrollbar-color: auto) {
  * { scrollbar-width: thin; scrollbar-color: rgba(148,163,184,.25) transparent; }
}
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }
.mi { font-family: 'Material Icons Round'; font-size: 20px; vertical-align: -4px; text-transform: none; }
.mi-sm { font-size: 16px; vertical-align: -3px; }

/* LAYOUT */
.shell { display: flex; flex-direction: column; min-height: 100vh; }
.top {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,14,26,.88);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--glass-bd);
  padding: 0 20px;
}
.top-inner {
  max-width: var(--max-w); margin: 0 auto;
  display: flex; align-items: center; height: 54px; gap: 8px;
}
.logo { font-weight: 700; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 7px; white-space: nowrap; }
.logo .mi { color: var(--accent); font-size: 24px; }
.logo b { color: var(--accent); }
.spacer { flex: 1; }
.nav-links { display: flex; gap: 4px; align-items: center; }
.nav-btn {
  padding: 6px 14px; border-radius: var(--rs); font: 500 13px var(--font);
  color: var(--tx2); cursor: pointer; border: none; background: none;
  transition: var(--tr); display: flex; align-items: center; gap: 5px; white-space: nowrap;
}
.nav-btn:hover { color: var(--tx); background: var(--glass); }
.nav-btn.active { color: var(--tx); background: var(--surface); }
.nav-btn.cta { background: var(--accent); color: #fff; font-weight: 600; }
.nav-btn.cta:hover { background: var(--accent2); }

.hamburger { display: none; background: none; border: none; color: var(--tx); cursor: pointer; padding: 4px; }
@media(max-width:700px){
  .hamburger { display: block; }
  .nav-links { display: none; position: absolute; top: 54px; left: 0; right: 0; background: rgba(10,14,26,.95); backdrop-filter: blur(16px); flex-direction: column; padding: 12px; border-bottom: 1px solid var(--glass-bd); gap: 4px; }
  .nav-links.open { display: flex; }
  .nav-btn { width: 100%; justify-content: flex-start; padding: 10px 16px; }
}

.main { flex: 1; max-width: var(--max-w); margin: 0 auto; padding: 24px 20px 60px; width: 100%; }
.footer { background: var(--bg2); border-top: 1px solid var(--glass-bd); padding: 20px; text-align: center; font-size: 11px; color: var(--tx3); }

/* CARDS */
.card { background: var(--surface); border: 1px solid var(--glass-bd); border-radius: var(--r); padding: 20px; backdrop-filter: blur(8px); transition: var(--tr); }
.card:hover { border-color: rgba(148,163,184,.25); }
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px;
  border-radius: var(--rs); font: 600 13px var(--font); cursor: pointer;
  border: 1px solid transparent; transition: var(--tr);
}
.btn-red { background: var(--accent); color: #fff; }
.btn-red:hover { background: var(--accent2); }
.btn-ghost { background: var(--glass); color: var(--tx); border-color: var(--glass-bd); }
.btn-ghost:hover { background: var(--surface); }
.btn-blue { background: var(--blue); color: #fff; }
.btn-blue:hover { background: #2563eb; }
.btn-purple { background: var(--purple); color: #fff; }
.btn-purple:hover { background: #9333ea; }
.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn-lg { padding: 14px 28px; font-size: 15px; }

/* FORMS */
.fg { margin-bottom: 16px; }
.fl { display: block; font: 600 11px var(--font); color: var(--tx2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
.fi, .fs, .ft {
  width: 100%; padding: 10px 14px; background: var(--bg2);
  border: 1px solid var(--glass-bd); border-radius: var(--rs);
  color: var(--tx); font: 400 14px var(--font); transition: var(--tr); outline: none;
}
.fi:focus, .fs:focus, .ft:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-soft); }
.ft { min-height: 120px; resize: vertical; }
.fhint { font-size: 11px; color: var(--tx3); margin-top: 4px; }
.fcheck { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; color: var(--tx2); }
.fcheck input { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }

/* BADGES */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-red { background: var(--accent-soft); color: var(--accent); }
.badge-blue { background: var(--blue-soft); color: var(--blue); }
.badge-green { background: var(--green-soft); color: var(--green); }
.badge-yellow { background: var(--yellow-soft); color: var(--yellow); }
.badge-purple { background: var(--purple-soft); color: var(--purple); }

/* MELDING CARDS */
.m-card { cursor: pointer; }
.m-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.3); }

/* PAGE TRANSITION */
.page { animation: fadeIn .25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* TOAST */
.toast-box { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast { background: var(--surface); border: 1px solid var(--glass-bd); backdrop-filter: blur(12px); padding: 10px 18px; border-radius: var(--rs); font-size: 13px; color: var(--tx); box-shadow: 0 8px 32px rgba(0,0,0,.3); animation: tIn .3s ease; max-width: 340px; }
.toast.out { animation: tOut .3s ease forwards; }
@keyframes tIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes tOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

/* EMPTY */
.empty { text-align: center; padding: 48px 20px; color: var(--tx3); }
.empty .mi { font-size: 48px; display: block; margin-bottom: 12px; opacity: .4; }

/* RESPONSIVE */
@media(max-width:600px){
  .main { padding: 16px 12px 40px; }
  .card { padding: 14px; }
  .card-grid { grid-template-columns: 1fr; }
}

/* SEARCH */
.search-wrap { position: relative; margin-bottom: 16px; }
.search-wrap .mi { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--tx3); font-size: 18px; }
.search-input { width: 100%; padding: 10px 14px 10px 38px; background: var(--bg2); border: 1px solid var(--glass-bd); border-radius: 24px; color: var(--tx); font: 400 14px var(--font); outline: none; }
.search-input:focus { border-color: var(--blue); }

/* NAAM-TAG */
.naam-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 14px; margin: 3px; border-radius: 20px;
  font-size: 12px; font-weight: 600; background: var(--accent-soft);
  color: var(--accent); border: 1px solid rgba(239,68,68,.2);
  cursor: pointer; transition: var(--tr);
}
.naam-tag:hover { background: rgba(239,68,68,.2); }
.naam-tag .count { background: var(--accent); color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 10px; margin-left: 2px; }

/* AI CHAT */
.ai-bubble {
  padding: 14px 16px; border-radius: 14px 14px 14px 4px;
  background: var(--blue-soft); border: 1px solid rgba(59,130,246,.2);
  font-size: 14px; color: var(--tx); line-height: 1.6; margin-bottom: 10px;
}
.user-bubble {
  padding: 14px 16px; border-radius: 14px 14px 4px 14px;
  background: var(--surface); border: 1px solid var(--glass-bd);
  font-size: 14px; color: var(--tx); line-height: 1.6; margin-bottom: 10px;
  margin-left: 40px;
}

/* BRONVERMELDINGEN */
sup a[title], sup[title] { border-bottom: 1px dotted var(--blue); }

/* ORGANIGRAM */
.org-grid { display: flex; flex-direction: column; align-items: center; gap: 0; }
.org-row { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; position: relative; }
.org-line-down { width: 2px; height: 28px; background: var(--glass-bd); margin: 0 auto; }
.org-line-branch { height: 2px; background: var(--glass-bd); position: absolute; top: 0; }

.org-node {
  position: relative; display: flex; flex-direction: column; align-items: center;
  cursor: pointer; transition: var(--tr); padding: 8px; z-index: 1;
}
.org-node:hover { transform: translateY(-4px); z-index: 9000; }
.org-node:hover .org-tooltip { display: block; }

.org-foto {
  width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
  border: 3px solid var(--glass-bd); transition: var(--tr);
  filter: saturate(.35) contrast(1.2) brightness(1.05);
}
.org-node:hover .org-foto { border-color: var(--accent); box-shadow: 0 0 24px rgba(239,68,68,.4); filter: saturate(.25) contrast(1.3) brightness(1.0) sepia(.1); }
.org-node.top .org-foto { width: 100px; height: 100px; border-color: var(--accent); filter: saturate(.3) contrast(1.25) brightness(1.0) sepia(.15); }

.org-naam { font-size: 12px; font-weight: 700; margin-top: 6px; text-align: center; max-width: 100px; line-height: 1.3; }
.org-func { font-size: 10px; color: var(--tx3); text-align: center; max-width: 100px; }
.org-partij { font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 10px; margin-top: 3px; }

.org-tooltip {
  display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
  width: 620px; max-width: 92vw; max-height: 75vh; overflow-y: auto;
  background: var(--bg2); border: 1px solid var(--glass-bd); border-radius: var(--r);
  padding: 24px; z-index: 9999; box-shadow: 0 16px 48px rgba(0,0,0,.6);
  backdrop-filter: blur(16px); margin-top: 8px;
}
.org-tooltip::before {
  content: ''; position: absolute; top: -6px; left: 50%; transform: translateX(-50%) rotate(45deg);
  width: 12px; height: 12px; background: var(--bg2); border-left: 1px solid var(--glass-bd);
  border-top: 1px solid var(--glass-bd);
}
.org-tooltip .tt-header { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 14px; }
.org-tooltip .tt-foto { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); flex-shrink: 0; filter: saturate(.3) contrast(1.2) brightness(1.0); }
.org-tooltip h3 { font-size: 18px; font-weight: 800; margin-bottom: 2px; }
.org-tooltip .sub { font-size: 12px; color: var(--tx2); margin-bottom: 0; }
.org-tooltip .tt-nu { font-size: 11px; color: var(--yellow); font-weight: 600; margin-top: 3px; }
.org-tooltip .dossier { font-size: 13px; line-height: 1.8; color: var(--tx); }
.org-tooltip .dossier strong { color: var(--accent); }
.org-tooltip .wet { background: var(--accent-soft); padding: 14px 16px; border-radius: var(--rs); margin-top: 14px; font-size: 12px; line-height: 1.8; }
.org-tooltip .wet-title { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; letter-spacing: .5px; }
.org-tooltip .wet-item { padding: 6px 0; border-bottom: 1px solid rgba(239,68,68,.1); }
.org-tooltip .wet-item:last-child { border-bottom: none; }
.org-tooltip .wet-item .wet-art { font-weight: 700; color: var(--accent); }
.org-tooltip .wet-item .wet-desc { color: var(--tx2); margin-top: 2px; }

@media(max-width:600px){
  .org-tooltip { position: fixed; top: auto; bottom: 0; left: 0; right: 0; transform: none; width: 100%; max-width: 100%; border-radius: var(--r) var(--r) 0 0; max-height: 60vh; }
  .org-tooltip::before { display: none; }
  .org-foto { width: 56px; height: 56px; }
  .org-node.top .org-foto { width: 72px; height: 72px; }
  .org-naam { font-size: 10px; max-width: 70px; }
  .org-row { gap: 8px; }
}

/* WIZARD */
.wiz-progress { display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 24px; }
.wiz-dot {
  width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; border: 2px solid var(--glass-bd); color: var(--tx3);
  background: var(--bg2); transition: var(--tr); position: relative; z-index: 1;
}
.wiz-dot.active { border-color: var(--blue); color: var(--blue); background: var(--blue-soft); box-shadow: 0 0 12px rgba(59,130,246,.3); }
.wiz-dot.done { border-color: var(--green); color: #fff; background: var(--green); }
.wiz-line { width: 40px; height: 2px; background: var(--glass-bd); }
.wiz-line.done { background: var(--green); }
.wiz-step { animation: fadeIn .3s ease; }
.wiz-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; gap: 10px; }

/* FOTO DROPZONE */
.foto-drop {
  width: 100%; min-height: 80px; border: 2px dashed var(--glass-bd); border-radius: var(--rs);
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px;
  padding: 16px; cursor: pointer; transition: var(--tr); background: var(--bg2); text-align: center;
}
.foto-drop:hover, .foto-drop.drag-over { border-color: var(--blue); background: var(--blue-soft); }
.foto-drop .mi { font-size: 28px; color: var(--tx3); }
.foto-preview {
  position: relative; display: inline-block;
}
.foto-preview img {
  width: 72px; height: 72px; border-radius: 50%; object-fit: cover;
  border: 3px solid var(--green); filter: saturate(.4) contrast(1.15);
}
.foto-preview .foto-rm {
  position: absolute; top: -4px; right: -4px; width: 22px; height: 22px;
  border-radius: 50%; background: var(--accent); color: #fff; border: none;
  font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  line-height: 1;
}

/* INSTANTIE CHIPS */
.chip-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.inst-chip {
  padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
  background: var(--glass); border: 1px solid var(--glass-bd); color: var(--tx2);
  cursor: pointer; transition: var(--tr);
}
.inst-chip:hover { background: var(--blue-soft); border-color: var(--blue); color: var(--blue); }
.inst-chip.sel { background: var(--blue); border-color: var(--blue); color: #fff; }

/* NAAM SUGGEST */
.naam-suggest {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
  background: var(--bg2); border: 1px solid var(--glass-bd); border-radius: var(--rs);
  max-height: 180px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
.naam-suggest-item {
  padding: 8px 14px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--glass-bd);
}
.naam-suggest-item:hover { background: var(--blue-soft); }
.naam-suggest-item:last-child { border-bottom: none; }
.naam-suggest-item .sg-count { font-size: 10px; color: var(--accent); font-weight: 700; }

/* PERSOON KAART in wizard */
.persoon-entry {
  background: var(--surface); border: 1px solid var(--glass-bd); border-radius: var(--r);
  padding: 16px; margin-bottom: 12px; position: relative;
}
.persoon-entry .pe-rm {
  position: absolute; top: 8px; right: 8px; background: none; border: none;
  color: var(--tx3); cursor: pointer; font-size: 18px;
}
.persoon-entry .pe-rm:hover { color: var(--accent); }

@media(max-width:600px){
  .wiz-line { width: 20px; }
  .wiz-dot { width: 28px; height: 28px; font-size: 11px; }
  .chip-grid { gap: 6px; }
  .inst-chip { padding: 6px 12px; font-size: 12px; }
}
</style>

<script>
/* ============================================================
   MELDPUNT AMBTENAREN v2.0 — Simpel. Namen. Verhalen. Publiceer.
   ============================================================ */

// ============ SUPABASE CONFIG ============
var SUPABASE_URL = ''; // Vul in na Supabase project aanmaken
var SUPABASE_KEY = ''; // Vul in: anon/public key
var SB = null;
var _user = null;
var _sbReady = false;

// Importeer RSA public key voor Web Crypto API
function importRSAPublicKey(){
  var pem = RSA_PUB_PEM.replace(/-----[^-]+-----/g,'').replace(/\s/g,'');
  var bin = Uint8Array.from(atob(pem), function(c){ return c.charCodeAt(0); });
  return crypto.subtle.importKey('spki', bin.buffer, {name:'RSA-OAEP',hash:'SHA-256'}, false, ['encrypt']);
}

// Hybrid encryptie: AES-256-GCM voor data, RSA-OAEP voor de AES key
function encryptData(plaintext){
  var encoder = new TextEncoder();
  var data = encoder.encode(plaintext);
  var aesKey, iv, rsaPubKey;
  return crypto.subtle.generateKey({name:'AES-GCM',length:256}, true, ['encrypt'])
    .then(function(key){ aesKey = key; iv = crypto.getRandomValues(new Uint8Array(12)); return crypto.subtle.encrypt({name:'AES-GCM',iv:iv}, aesKey, data); })
    .then(function(encrypted){
      return crypto.subtle.exportKey('raw', aesKey).then(function(rawKey){
        return importRSAPublicKey().then(function(pubKey){
          return crypto.subtle.encrypt({name:'RSA-OAEP'}, pubKey, rawKey);
        });
      }).then(function(encKey){
        return {
          v: 1,
          iv: btoa(String.fromCharCode.apply(null, iv)),
          key: btoa(String.fromCharCode.apply(null, new Uint8Array(encKey))),
          data: btoa(String.fromCharCode.apply(null, new Uint8Array(encrypted)))
        };
      });
    });
}

// GitHub Issues API
var API_BASE = '/api';
var _adminLoggedIn = false;

function apiFetch(url, opts, cb) {
  if(typeof opts === 'function'){ cb = opts; opts = {}; }
  opts = opts || {};
  opts.credentials = 'include';
  if(opts.body && typeof opts.body === 'object' && !(opts.body instanceof FormData)){
    opts.headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
    opts.body = JSON.stringify(opts.body);
  }
  fetch(API_BASE + url, opts)
    .then(function(r){ return r.json().then(function(d){ return {ok:r.ok, status:r.status, data:d}; }); })
    .then(function(res){ cb(res.ok ? null : (res.data.error||'Fout'), res.data, res.status); })
    .catch(function(e){
      // Fallback: als API niet bereikbaar is (GitHub Pages), gebruik GitHub Issues
      cb('offline', null, 0);
    });
}

// Submit via GitHub Issues (encrypted)
function submitViaGitHub(melding, cb){
  if(GH_TOKEN.indexOf('PLACEHOLDER') >= 0){
    // Geen token: sla lokaal op
    var id = 'local_' + Date.now();
    melding.id = id;
    melding.status = 'local';
    DS.push('meldingen', melding);
    cb(null, {id: id, claimCode: 'LOCAL', status: 'local'});
    return;
  }

  // Scheid publiek en gevoelig
  var publicData = {
    namen: (melding.namen||[]).map(function(n){ return n.naam; }),
    instantie: melding.instantie || '',
    plaats: melding.plaats || '',
    datum: new Date().toISOString().slice(0,10)
  };

  var sensitiveData = JSON.stringify({
    namen: melding.namen,
    verhaal: melding.verhaal,
    titel: melding.titel,
    melder_email: melding.melder_email,
    melder_naam: melding.melder_naam,
    instantie: melding.instantie,
    plaats: melding.plaats,
    ts: melding.ts,
    anoniem: melding.anoniem
  });

  var title = publicData.datum + ' | ' + publicData.namen.join(', ') + (publicData.plaats ? ' | ' + publicData.plaats : '');

  encryptData(sensitiveData).then(function(encrypted){
    var feitenStr = (melding.feiten && melding.feiten.length > 0)
      ? melding.feiten.map(function(f){ return '- **' + f.feit + '** (' + (f.juridisch || '') + ') — ' + f.wet + ' — _' + f.sanctie + '_'; }).join('\n')
      : '—';

    var body = '<!-- ENCRYPTED MELDING v1 -->\n' +
      '**Datum:** ' + publicData.datum + '\n' +
      '**Namen:** ' + publicData.namen.join(', ') + '\n' +
      '**Instantie:** ' + (publicData.instantie || '—') + '\n' +
      '**Plaats:** ' + (publicData.plaats || '—') + '\n\n' +
      '**Gemelde feiten:**\n' + feitenStr + '\n\n' +
      '---\n\n' +
      '```encrypted\n' + JSON.stringify(encrypted) + '\n```';

    return fetch('https://api.github.com/repos/' + GH_REPO + '/issues', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + GH_TOKEN,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github+json'
      },
      body: JSON.stringify({
        title: title,
        body: body,
        labels: [GH_LABEL]
      })
    });
  }).then(function(r){ return r.json(); })
  .then(function(issue){
    if(issue.id){
      var id = 'gh_' + issue.number;
      melding.id = id;
      melding.status = 'submitted';
      DS.push('meldingen', melding);
      // Stuur email notificaties (naar eigenaar + melder, NOOIT naar ambtenaar)
      stuurEmailNotificatie(melding);
      cb(null, {id: id, claimCode: 'GH-' + issue.number, status: 'submitted'});
    } else {
      cb(issue.message || 'GitHub fout');
    }
  }).catch(function(e){ cb('Versleuteling/verzending mislukt: ' + e.message); });
}

// Laad meldingen van GitHub Issues (publiek, geen token nodig)
function loadGitHubMeldingen(cb){
  fetch('https://api.github.com/repos/' + GH_REPO + '/issues?labels=' + GH_LABEL + '&state=open&per_page=100', {
    headers: { 'Accept': 'application/vnd.github+json' }
  })
  .then(function(r){ return r.json(); })
  .then(function(issues){
    if(!Array.isArray(issues)){ cb([]); return; }
    var meldingen = issues.map(function(issue){
      // Parse publieke data uit issue body
      var namen = [];
      var instantie = '';
      var plaats = '';
      var datum = '';
      var lines = (issue.body||'').split('\n');
      lines.forEach(function(line){
        var m;
        if((m = line.match(/\*\*Datum:\*\*\s*(.+)/))) datum = m[1].trim();
        if((m = line.match(/\*\*Namen:\*\*\s*(.+)/))) namen = m[1].split(',').map(function(s){return{naam:s.trim(),functie:''}});
        if((m = line.match(/\*\*Instantie:\*\*\s*(.+)/))) instantie = m[1].trim();
        if((m = line.match(/\*\*Plaats:\*\*\s*(.+)/))) plaats = m[1].trim();
      });
      if(instantie === '—') instantie = '';
      if(plaats === '—') plaats = '';
      return {
        id: 'gh_' + issue.number,
        gh_number: issue.number,
        titel: namen.map(function(n){return n.naam}).join(', '),
        namen: namen,
        instantie: instantie,
        plaats: plaats,
        verhaal: '',
        ts: new Date(datum || issue.created_at).getTime(),
        anoniem: true,
        melder_naam: null,
        views: 0,
        status: 'submitted'
      };
    });
    cb(meldingen);
  })
  .catch(function(e){ console.warn('GitHub Issues laden mislukt:', e); cb([]); });
}

// ============ DS — LOKALE CACHE (backward compatible) ============
var DS = {
  _c: { meldingen: [], reacties: [], ambtenaren: [] },
  all: function(c){ return this._c[c] || []; },
  get: function(c, id){ var a = this.all(c); for(var i=0;i<a.length;i++){ if(a[i].id===id) return a[i]; } return null; },
  count: function(c){ return this.all(c).length; },
  query: function(c, fn){ return this.all(c).filter(fn); },
  // Laad data van API in cache
  load: function(c, data){ this._c[c] = data || []; },
  // Voeg lokaal toe aan cache (na succesvolle API call)
  push: function(c, item){ this._c[c].push(item); },
  add: function(c, item){ if(!item.id) item.id = 'seed_' + Date.now() + '_' + Math.random().toString(36).substr(2,6); this._c[c].push(item); },
  del: function(c, id){ this._c[c] = this._c[c].filter(function(x){ return x.id !== id; }); }
};

function parseRoute(){
  var h = window.location.hash.replace(/^#/,'') || '/';
  _params = {};

  else if(h === '/meldingen') _route = '/meldingen';
  else if(h.indexOf('/melding/') === 0){ _route = '/melding'; _params.id = h.replace('/melding/',''); }
  else if(h === '/melden') _route = '/melden';
  else if(h === '/melden-ai') _route = '/melden-ai';
  else if(h === '/namen') _route = '/namen';
  else if(h === '/staatsontvoeringen') _route = '/staatsontvoeringen';
  else if(h === '/missie') _route = '/missie';
  else if(h === '/klokkenluider') _route = '/klokkenluider';
  else if(h === '/organigram') _route = '/organigram';
  else if(h === '/tijdlijn') _route = '/tijdlijn';
  else if(h === '/rechtspraak') _route = '/rechtspraak';
  else if(h === '/documentatie') _route = '/documentatie';
  else if(h === '/juridische-hulp') _route = '/juridische-hulp';
  else if(h === '/oplossing') _route = '/oplossing';
  else if(h === '/geld') _route = '/geld';
  else if(h === '/dossier') _route = '/dossier';
  else if(h.indexOf('/dossier/') === 0){ _route = '/dossier-detail'; _params.id = h.replace('/dossier/',''); }
  else if(h === '/uploaden') _route = '/uploaden';
  else if(h === '/ehrm') _route = '/ehrm';

var _loadingHtml = '<div style="display:flex;justify-content:center;padding:60px 0"><div style="width:28px;height:28px;border:3px solid var(--glass-bd);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite"></div></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';

function render(){
  var app = document.getElementById('app');

  // Pagina's die API-data nodig hebben → eerst laden, dan renderen
  var asyncPages = ['/', '/meldingen', '/melding', '/namen', '/admin', '/claim'];
  if(asyncPages.indexOf(_route) > -1){
    app.innerHTML = _loadingHtml;
  }

  switch(_route){
    case '/':
      API.getMeldingen(function(err, data){
        if(!err) DS.load('meldingen', data);
        app.innerHTML = pgHome();
      });
      break;
    case '/meldingen':
      API.getMeldingen(function(err, data){
        if(!err) DS.load('meldingen', data);
        app.innerHTML = pgMeldingen();
      });
      break;
    case '/melding':
      API.getMelding(_params.id, function(err, data){
        if(err){
          // Fallback: probeer uit localStorage
          var local = DS.get('meldingen', _params.id);
          if(local){ _currentMelding = local; _currentMelding._reacties = []; app.innerHTML = pgMelding(); return; }
          _currentMelding = null; app.innerHTML = pgMelding(); return;
        }
        _currentMelding = data;
        // Laad ook reacties
        API.getReacties(_params.id, function(err2, reacties){
          _currentMelding._reacties = err2 ? [] : reacties;
          app.innerHTML = pgMelding();
        });
      });
      break;
    case '/melden': app.innerHTML = pgMelden(); initMeldListeners(); break;
    case '/melden-ai': app.innerHTML = pgMeldenAI(); initAI(); break;
    case '/namen':

function timeAgo(ts){
  if(!ts) return '';
  var d = Math.floor((Date.now()-ts)/86400000);
  if(d === 0) return 'vandaag';
  if(d === 1) return 'gisteren';
  if(d < 7) return d + ' dagen geleden';
  if(d < 30) return Math.floor(d/7) + ' weken geleden';
  return Math.floor(d/30) + ' maanden geleden';
}

// ============ NAMEN AGGREGATIE ============
function getNamenLijst(meldingen){
  if(!meldingen) meldingen = DS.all('meldingen');
  var map = {};
  meldingen.forEach(function(m){
    (m.namen || []).forEach(function(n){
      var key = (n.naam||'').trim().toLowerCase();
      if(!key) return;
      if(!map[key]) map[key] = { naam: n.naam, count: 0, instanties: {}, meldingIds: [], email: '', feiten: {}, maxSancties: {} };
      map[key].count++;
      if(n.functie) map[key].functie = n.functie;
      if(n.email) map[key].email = n.email;
      if(m.instantie) map[key].instanties[m.instantie] = true;
      map[key].meldingIds.push(m.id);
      if(n.naam.length > map[key].naam.length) map[key].naam = n.naam;
      // Verzamel feiten en max sancties per persoon
      (m.feiten || []).forEach(function(f){
        if(f.feit) map[key].feiten[f.feit] = f;
        if(f.maxSanctie) map[key].maxSancties[f.maxSanctie] = true;
      });
    });
  });
  var list = [];
  for(var k in map) list.push(map[k]);
  list.sort(function(a,b){ return b.count - a.count; });
  return list;
}

function registreerAmbtenaar(){
  var email = (document.getElementById('ambtenaarEmail').value||'').trim();
  var naam = (document.getElementById('ambtenaarNaam').value||'').trim();
  var org = (document.getElementById('ambtenaarOrg').value||'').trim();
  if(!email || email.indexOf('@') < 0){ toast('Vul een geldig e-mailadres in'); return; }
  if(!naam){ toast('Vul je naam in'); return; }
  apiFetch('/ambtenaren', {method:'POST', body:{email:email, naam:naam, organisatie:org}}, function(err){
    if(err){ toast('Fout: ' + err); return; }
    toast('Bedankt ' + naam + '. Wij sturen je de meldingen.');
  });
  document.getElementById('ambtenaarEmail').value = '';
  document.getElementById('ambtenaarNaam').value = '';
  document.getElementById('ambtenaarOrg').value = '';
}

function zoekMeldingen(val){
  _zoek = val;
  clearTimeout(window._zt);
  window._zt = setTimeout(function(){
    document.getElementById('app').innerHTML = pgMelden();
    var inp = document.querySelector('.search-input');
    if(inp){ inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  }, 250);
}

function pgMelding(){
  var m = _currentMelding;
  if(!m) return '<div class="page"><div class="empty"><span class="mi">error</span><p>Melding niet gevonden.</p></div></div>';

  // Namen worden NIET publiek getoond — alleen via decrypt.html

  var verhaalHtml = (m.verhaal||'').split('\n').filter(function(p){return p.trim();}).map(function(p){return '<p style="margin-bottom:10px">' + esc(p) + '</p>';}).join('');

  // Reacties worden apart geladen
  var reacties = m._reacties || [];
  var reactieHtml = '';
  reacties.forEach(function(r){
    reactieHtml += '<div class="card" style="padding:12px;margin-bottom:6px">' +
      '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--tx3);margin-bottom:4px">' +
        '<span>' + esc(r.naam||'Anoniem') + '</span><span>' + timeAgo(r.ts) + '</span>' +
      '</div>' +
      '<div style="font-size:13px">' + esc(r.tekst) + '</div>' +
    '</div>';
  });

  return '<div class="page">' +
    '<button class="btn btn-ghost btn-sm" onclick="go(\'/melden\')" style="margin-bottom:14px"><span class="mi mi-sm">arrow_back</span> Terug</button>' +

    '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">' +
      (m.klokkenluider ? '<span class="badge badge-purple"><span class="mi mi-sm">shield</span> Klokkenluider</span>' : '') +
      (m.instantie ? '<span class="badge badge-blue"><span class="mi mi-sm">business</span> ' + esc(m.instantie) + '</span>' : '') +
      '<span class="badge badge-blue"><span class="mi mi-sm">event</span> ' + fmtDate(m.ts) + '</span>' +
    '</div>' +

    '<h1 style="font-size:22px;font-weight:800;margin-bottom:14px;line-height:1.3">' + esc(m.titel) + '</h1>' +

    // Verhaal
    '<div style="font-size:15px;line-height:1.8;margin-bottom:20px">' + verhaalHtml + '</div>' +

    // Feiten & sancties
    (function(){
      var ff = m.feiten || [];
      if(!ff.length) return '';
      var h = '<div style="margin-bottom:20px">' +
        '<h3 style="font-size:15px;font-weight:700;margin-bottom:10px"><span class="mi mi-sm">gavel</span> Gemelde feiten &amp; sancties</h3>';
      ff.forEach(function(f){
        h += '<div class="card" style="padding:12px;margin-bottom:8px;border-left:3px solid var(--accent)">' +
          '<div style="font-size:14px;font-weight:700;margin-bottom:4px">' + esc(f.feit) + '</div>' +
          '<div style="font-size:12px;color:var(--accent);font-weight:600;margin-bottom:6px">' + esc(f.juridisch || '') + '</div>' +
          '<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">' +
            (f.wet ? '<span class="badge badge-blue" style="font-size:10px">' + esc(f.wet) + '</span>' : '') +
            (f.sanctie ? '<span class="badge badge-red" style="font-size:10px">' + esc(f.sanctie) + '</span>' : '') +
            (f.maxSanctie ? '<span style="font-size:10px;padding:3px 8px;border-radius:4px;background:var(--accent);color:#fff;font-weight:700">⚖ MAX: ' + esc(f.maxSanctie) + '</span>' : '') +
            (f.categorie ? '<span class="badge badge-purple" style="font-size:10px">' + esc(f.categorie) + '</span>' : '') +
          '</div>' +
        '</div>';
      });
      h += '</div>';
      return h;
    })() +

    // Directe bronnen van dit verhaal
    (function(){
      var b = m.bronnen || [];
      if(!b.length) return '';
      var h = '<div class="card" style="padding:18px;margin-bottom:16px;border-left:3px solid var(--accent);background:linear-gradient(135deg,rgba(239,68,68,.06),rgba(239,68,68,.02))">' +
        '<div style="font-size:13px;font-weight:700;margin-bottom:10px;color:var(--accent)"><span class="mi mi-sm">fact_check</span> Bronnen bij dit verhaal</div>' +
        '<div style="font-size:12px;color:var(--tx2);line-height:2">';
      b.forEach(function(it){
        h += '<div style="display:flex;align-items:baseline;gap:6px">' +
          '<span class="mi mi-sm" style="font-size:10px;color:var(--accent);flex-shrink:0">link</span>' +
          '<a href="' + esc(it.u) + '" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none">' + esc(it.t) + '</a>' +
        '</div>';
      });
      h += '</div></div>';
      return h;
    })() +

    // Gelinkte melding
    (function(){
      if(!m.linked_to) return '';
      var linked = DS.get('meldingen', m.linked_to);
      if(!linked) return '';
      var linkLabel = (linked.instantie || 'Melding') + (linked.plaats ? ' — ' + linked.plaats : '') +
        ' (' + (linked.ts ? new Date(linked.ts).toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'}) : '?') + ')';
      var relatieText = m.link_relatie === 'voor' ? 'Dit gebeurde v\u00f3\u00f3r:' : (m.link_relatie === 'na' ? 'Dit gebeurde n\u00e1:' : 'Gerelateerd aan:');
      return '<div class="card" style="padding:14px;margin-bottom:16px;border-left:3px solid var(--purple);cursor:pointer" onclick="go(\'/melding/' + linked.id + '\')">' +
        '<div style="font-size:12px;font-weight:700;color:var(--purple);margin-bottom:4px"><span class="mi mi-sm">link</span> ' + relatieText + '</div>' +
        '<div style="font-size:14px;font-weight:600">' + esc(linked.titel || linkLabel) + '</div>' +
        '<div style="font-size:12px;color:var(--tx3);margin-top:2px">' + esc(linkLabel) + '</div>' +
      '</div>';
    })() +

    // Relevante bronnen & documentatie (context)
    bronnenContext(m) +

    // Deel
    '<div class="card" style="padding:14px;margin-bottom:16px;border-left:3px solid var(--green)">' +
      '<div style="font-size:12px;font-weight:700;margin-bottom:6px"><span class="mi mi-sm" style="color:var(--green)">share</span> Deel dit verhaal</div>' +
      '<div style="display:flex;gap:6px;flex-wrap:wrap">' +
        '<button class="btn btn-sm btn-ghost" onclick="deel(\'' + m.id + '\',\'x\')">X / Twitter</button>' +
        '<button class="btn btn-sm btn-ghost" onclick="deel(\'' + m.id + '\',\'wa\')">WhatsApp</button>' +
        '<button class="btn btn-sm btn-ghost" onclick="deel(\'' + m.id + '\',\'fb\')">Facebook</button>' +
        '<button class="btn btn-sm btn-ghost" onclick="deel(\'' + m.id + '\',\'copy\')"><span class="mi mi-sm">content_copy</span> Link</button>' +
      '</div>' +
    '</div>' +

    // Reacties
    '<h3 style="font-size:15px;font-weight:700;margin-bottom:10px"><span class="mi mi-sm">chat</span> Reacties (' + reacties.length + ')</h3>' +
    reactieHtml +
    '<div class="card" style="padding:12px;margin-top:6px">' +
      '<textarea class="ft" id="rTekst" style="min-height:50px;margin-bottom:6px" placeholder="Schrijf een reactie..."></textarea>' +
      '<div style="display:flex;gap:8px;align-items:center">' +
        '<input class="fi" id="rNaam" placeholder="Je naam (optioneel)" style="flex:1;padding:8px 12px">' +
        '<button class="btn btn-red btn-sm" onclick="plaatsReactie(\'' + m.id + '\')"><span class="mi mi-sm">send</span></button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function plaatsReactie(mid){
  var t = (document.getElementById('rTekst')||{}).value;
  if(!t || !t.trim()){ toast('Schrijf eerst iets'); return; }
  var naam = ((document.getElementById('rNaam')||{}).value||'').trim() || 'Anoniem';
  API.submitReactie({ mid: mid, naam: naam, tekst: t.trim() }, function(err, data){
    if(err){ toast('Fout: ' + err); return; }
    toast('Reactie geplaatst!');
    render();
  });
}

function deel(id, platform){
  var m = _currentMelding || DS.get('meldingen', id); if(!m) return;
  var url = location.origin + location.pathname + '#/melding/' + id;
  var txt = 'Lees dit op Meldpunt Ambtenaren: "' + (m.titel||'') + '"';
  if(platform==='x') window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(txt)+'&url='+encodeURIComponent(url),'_blank');
  else if(platform==='wa') window.open('https://wa.me/?text='+encodeURIComponent(txt+' '+url),'_blank');
  else if(platform==='fb') window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(url),'_blank');
  else if(platform==='copy'){ if(navigator.clipboard) navigator.clipboard.writeText(url).then(function(){toast('Link gekopieerd!')}); else prompt('Kopieer:',url); }
}

// ---- WIZARD NAVIGATIE ----
function meldVolgende(){
  syncMeldVelden();
  if(_meldStap === 1){
    var namen = _namen.filter(function(n){ return n.naam.trim(); });
    if(namen.length === 0){ toast('Vul minstens één naam in'); return; }
  }
  if(_meldStap < 2) _meldStap++;
  render();
  initMeldListeners();
}
function meldVorige(){
  syncMeldVelden();
  if(_meldStap > 1) _meldStap--;
  render();
  initMeldListeners();
}
function syncMeldVelden(){
  _namen.forEach(function(n,i){
    var nEl = document.getElementById('nNaam'+i);
    var fEl = document.getElementById('nFunc'+i);
    var eEl = document.getElementById('nEmail'+i);
    if(nEl) n.naam = nEl.value.trim();
    if(fEl) n.functie = fEl.value.trim();
    if(eEl) n.email = eEl.value.trim();
  });
  var inst = document.getElementById('mInstantie') || document.getElementById('mInstantieS1');
  if(inst && inst.value && inst.value !== '__anders__') _meldInstantie = inst.value;
  var instAnders = document.getElementById('mInstAndersS1');
  if(instAnders && instAnders.style.display !== 'none' && instAnders.value.trim()) _meldInstantie = instAnders.value.trim();
  var tit = document.getElementById('mTitel') || document.getElementById('mTitelS1');
  if(tit) _meldTitel = tit.value;
  var ver = document.getElementById('mVerhaal') || document.getElementById('mVerhaalS1');
  if(ver) _meldVerhaal = ver.value;
  var pl = document.getElementById('mPlaats');
  if(pl) _meldPlaats = pl.value.trim();
  var me = document.getElementById('mMelderEmail');
  if(me) _melderEmail = me.value.trim();
}

// ---- NAAM FUNCTIES ----
function voegNaamToe(){ _namen.push({naam:'',functie:'',email:''}); syncMeldVelden(); render(); initMeldListeners(); }
function verwijderNaam(i){ _namen.splice(i,1); delete _meldFotos[i]; reindexFotos(i); syncMeldVelden(); render(); initMeldListeners(); }
function updateNaam(i,field,val){ _namen[i][field] = val; }
function toggleFeit(idx){
  var pos = _meldFeiten.indexOf(idx);
  if(pos >= 0) _meldFeiten.splice(pos, 1);
  else _meldFeiten.push(idx);
  render(); initMeldListeners();
}
function addFeitFromDropdown(sel){
  var idx = parseInt(sel.value);
  if(isNaN(idx)) return;
  if(_meldFeiten.indexOf(idx) < 0) _meldFeiten.push(idx);
  sel.value = '';
  render(); initMeldListeners();
}
function removeFeit(idx){
  var pos = _meldFeiten.indexOf(idx);
  if(pos >= 0) _meldFeiten.splice(pos, 1);
  render(); initMeldListeners();
}
function reindexFotos(removed){
  var nf = {};
  Object.keys(_meldFotos).forEach(function(k){
    var ki = parseInt(k);
    if(ki < removed) nf[ki] = _meldFotos[ki];
    else if(ki > removed) nf[ki-1] = _meldFotos[ki];
  });
  _meldFotos = nf;
}

// ---- FOTO FUNCTIES ----
function zoekFoto(i){
  syncMeldVelden();
  var naam = _namen[i] && _namen[i].naam;
  if(!naam || !naam.trim()){ toast('Vul eerst een naam in'); return; }
  var url = 'https://www.google.com/search?tbm=isch&q=' + encodeURIComponent(naam + ' ambtenaar nederland overheid');
  window.open(url, '_blank');
  toast('Zoek de juiste foto en sleep of kopieer de afbeeldings-URL');
}
function plakFotoUrl(i){
  var url = prompt('Plak de URL van de foto:');
  if(url && url.match(/^https?:\/\//)){
    _meldFotos[i] = url;
    render();
    initMeldListeners();
  }
}
function verwijderFoto(i){
  delete _meldFotos[i];
  render();
  initMeldListeners();
}
function uploadFotoFile(i, files){
  if(!files || !files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e){
    _meldFotos[i] = e.target.result;
    render();
    initMeldListeners();
  };
  reader.readAsDataURL(files[0]);
}

// ---- FOTO DRAG & DROP ----
function initMeldListeners(){
  setTimeout(function(){
    _namen.forEach(function(n, i){
      var dz = document.getElementById('fotoDrop' + i);
      if(!dz) return;
      dz.addEventListener('dragover', function(e){ e.preventDefault(); e.stopPropagation(); dz.classList.add('drag-over'); });
      dz.addEventListener('dragleave', function(e){ dz.classList.remove('drag-over'); });
      dz.addEventListener('drop', function(e){
        e.preventDefault(); e.stopPropagation(); dz.classList.remove('drag-over');
        // URL van internet (sleep afbeelding uit browser)
        var url = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain') || e.dataTransfer.getData('text/html');
        if(url){
          // Probeer URL uit HTML te halen (bijv. <img src="...">)
          var m = url.match(/https?:\/\/[^\s"'<>]+\.(jpg|jpeg|png|gif|webp|bmp|svg)[^\s"'<>]*/i);
          if(m){ _meldFotos[i] = m[0]; render(); initMeldListeners(); return; }
          if(url.match(/^https?:\/\//)) { _meldFotos[i] = url.split('\n')[0].trim(); render(); initMeldListeners(); return; }
        }
        // Lokaal bestand
        if(e.dataTransfer.files && e.dataTransfer.files[0]){
          var reader = new FileReader();
          reader.onload = function(ev){ _meldFotos[i] = ev.target.result; render(); initMeldListeners(); };
          reader.readAsDataURL(e.dataTransfer.files[0]);

// ============ BRIEF UPLOAD + EXTRACTIE (MEERDERE BRIEVEN) ============
var _briefTeksten = []; // alle briefteksten verzameld
var _briefBestanden = []; // bestandsnamen

function verwerkBrieven(files){
  if(!files || files.length === 0) return;
  var dropzone = document.getElementById('briefDropzone');
  var total = files.length;
  var klaar = 0;
  dropzone.innerHTML = '<span class="mi" style="font-size:28px;color:var(--blue);display:block;margin-bottom:4px">hourglass_top</span><div style="font-size:13px;font-weight:600">' + total + ' brief' + (total > 1 ? 'brieven' : '') + ' worden gelezen...</div><div style="font-size:11px;color:var(--tx3)" id="briefProgress">0/' + total + '</div>';

  for(var i = 0; i < files.length; i++){
    (function(file){
      verwerkBrief(file, function(){
        klaar++;
        var prog = document.getElementById('briefProgress');
        if(prog) prog.textContent = klaar + '/' + total;
        if(klaar >= total){
          // Alle brieven verwerkt — combineer resultaten
          combineerBriefResultaten();
        }
      });
    })(files[i]);
  }
}

function verwerkBrief(file, callback){
  if(!file){ if(callback) callback(); return; }

  var _cb = callback || function(){};
  if(file.type === 'text/plain' || file.name.endsWith('.txt')){
    var reader = new FileReader();
    reader.onload = function(e){ briefGelezenMulti(e.target.result, file.name); _cb(); };
    reader.readAsText(file);
  } else if(file.type === 'application/pdf'){
    if(typeof pdfjsLib !== 'undefined'){
      extractPdfText(file, _cb);
    } else {
      var s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload = function(){
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        extractPdfText(file, _cb);
      };
      s.onerror = function(){ briefGelezenMulti('', file.name); _cb(); };
      document.head.appendChild(s);
    }
  } else if(file.type.startsWith('image/')){
    if(typeof Tesseract !== 'undefined'){
      extractImageText(file, _cb);
    } else {
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
      s.onload = function(){ extractImageText(file, _cb); };
      s.onerror = function(){ briefGelezenMulti('', file.name); _cb(); };
      document.head.appendChild(s);
    }
  } else {
    briefGelezenMulti('', file.name); _cb();
  }
}

function briefGelezenMulti(tekst, filename){
  if(tekst && tekst.trim().length > 10){
    _briefTeksten.push(tekst);
    _briefBestanden.push(filename);
  }
}

function extractPdfText(file, cb){
  var reader = new FileReader();
  reader.onload = function(e){
    var data = new Uint8Array(e.target.result);
    pdfjsLib.getDocument({data: data}).promise.then(function(pdf){
      var pages = [];
      var total = pdf.numPages;
      function nextPage(i){
        if(i > total){ briefGelezenMulti(pages.join('\n\n'), file.name); if(cb) cb(); return; }
        pdf.getPage(i).then(function(page){
          page.getTextContent().then(function(tc){
            pages.push(tc.items.map(function(it){ return it.str; }).join(' '));
            nextPage(i+1);
          });
        });
      }
      nextPage(1);
    }).catch(function(err){
      briefGelezenMulti('', file.name); if(cb) cb();
    });
  };
  reader.readAsArrayBuffer(file);
}

function extractImageText(file, cb){
  Tesseract.recognize(file, 'nld', {
    logger: function(m){
      if(m.status === 'recognizing text' && m.progress){
        var prog = document.getElementById('briefProgress');
        if(prog) prog.textContent = 'OCR: ' + Math.round(m.progress * 100) + '%';
      }
    }
  }).then(function(result){
    briefGelezenMulti(result.data.text, file.name); if(cb) cb();
  }).catch(function(err){
    briefGelezenMulti('', file.name); if(cb) cb();
  });
}

function extracteerGegevens(tekst){
  var result = { namen: [], instantie: '', datum: '', onderwerp: '', kenmerk: '' };
  var lines = tekst.split(/\n/);

  // Instanties herkennen
  var bekende = [
    'Belastingdienst', 'Dienst Toeslagen', 'UWV', 'SVB', 'DUO', 'IND', 'CBR', 'CJIB',
    'Rijksdienst', 'RVO', 'CAK', 'CIZ', 'Kadaster', 'KvK', 'Kamer van Koophandel',
    'Politie', 'Openbaar Ministerie', 'Rechtbank', 'Raad van State', 'Hoge Raad',
    'Jeugdzorg', 'Veilig Thuis', 'Raad voor de Kinderbescherming',
    'Sociale Verzekeringsbank', 'Inspectie', 'NVWA', 'FIOD',
    'Immigratie- en Naturalisatiedienst'
  ];
  var gemeenteMatch = tekst.match(/[Gg]emeente\s+([A-Z][a-z]+(?:\s+[a-z]+)?(?:\s+[A-Z][a-z]+)?)/);
  if(gemeenteMatch) result.instantie = 'Gemeente ' + gemeenteMatch[1].trim();

  bekende.forEach(function(inst){
    if(tekst.indexOf(inst) >= 0 && !result.instantie) result.instantie = inst;
  });

  // Datum herkennen (diverse formats)
  var datumPatterns = [
    /(\d{1,2})\s+(januari|februari|maart|april|mei|juni|juli|augustus|september|oktober|november|december)\s+(\d{4})/i,
    /(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})/,
    /(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/
  ];
  datumPatterns.forEach(function(p){
    var m = tekst.match(p);
    if(m && !result.datum) result.datum = m[0];
  });

  // Onderwerp
  lines.forEach(function(line){
    var l = line.trim();
    if(/^[Oo]nderwerp\s*[:;]\s*(.+)/.test(l)){
      result.onderwerp = l.replace(/^[Oo]nderwerp\s*[:;]\s*/, '').trim();
    }
    if(/^[Bb]etreft\s*[:;]\s*(.+)/.test(l)){
      result.onderwerp = l.replace(/^[Bb]etreft\s*[:;]\s*/, '').trim();
    }
  });

  // Kenmerk
  lines.forEach(function(line){
    var l = line.trim();
    if(/[Kk]enmerk\s*[:;]\s*(.+)/.test(l)){
      result.kenmerk = l.replace(/.*[Kk]enmerk\s*[:;]\s*/, '').trim();
    }
    if(/[Zz]aaknummer\s*[:;]\s*(.+)/.test(l)){
      result.kenmerk = l.replace(/.*[Zz]aaknummer\s*[:;]\s*/, '').trim();
    }
  });

  // Namen extraheren: zoek "Hoogachtend," / "Met vriendelijke groet," etc. en kijk wat erna komt
  var ondertekeningIndex = -1;
  var groetPatterns = [/[Hh]oogachtend/, /[Mm]et\s+(vriendelijke\s+)?groet/, /[Nn]amens\s+de/, /[Dd]e\s+inspecteur/, /[Dd]e\s+directeur/, /[Dd]e\s+minister/, /[Dd]e\s+staatssecretaris/, /[Dd]e\s+wethouder/, /[Dd]e\s+burgemeester/];
  lines.forEach(function(line, idx){
    groetPatterns.forEach(function(p){
      if(p.test(line) && ondertekeningIndex < 0) ondertekeningIndex = idx;
    });
  });

  if(ondertekeningIndex >= 0){
    // Zoek namen na de ondertekening
    for(var i = ondertekeningIndex + 1; i < Math.min(ondertekeningIndex + 8, lines.length); i++){
      var naam = lines[i].trim();
      // Filter lege regels en niet-namen
      if(!naam || naam.length < 3 || naam.length > 60) continue;
      if(/^[a-z]/.test(naam)) continue; // begint niet met hoofdletter
      if(/^\d/.test(naam)) continue; // begint met getal
      if(/^(Postbus|Telefoon|Tel|Fax|E-mail|Website|www|http|Bijlage)/i.test(naam)) continue;
      if(/^(de |het |een |van |voor |bij |op |in |met |aan )/i.test(naam) && !/^(de heer|mevrouw)/i.test(naam)) continue;
      // Lijkt op een naam
      if(/^[A-Z][a-zéèëêïöüá]+\.?\s/.test(naam) || /^(drs\.|mr\.|ir\.|dr\.|prof\.|ing\.)\s/i.test(naam) || /^[A-Z]\.\s*[A-Z]/.test(naam)){
        var cleanNaam = naam.replace(/^(drs\.|mr\.|ir\.|dr\.|prof\.|ing\.)\s*/i, '').trim();
        if(cleanNaam.length > 2 && cleanNaam.length < 50){
          result.namen.push(cleanNaam);
        }
      }
    }
  }

  // Zoek ook naar "De heer/Mevrouw X" of "behandeld door"
  lines.forEach(function(line){
    var l = line.trim();
    var m;
    if((m = l.match(/[Bb]ehandeld\s+door\s*[:;]?\s*(.+)/))) {
      var n = m[1].trim().replace(/^(drs\.|mr\.|ir\.|dr\.|prof\.|ing\.)\s*/i, '');
      if(n.length > 2 && n.length < 50 && result.namen.indexOf(n) < 0) result.namen.push(n);
    }
    if((m = l.match(/[Cc]ontactpersoon\s*[:;]?\s*(.+)/))) {
      var n2 = m[1].trim().replace(/^(drs\.|mr\.|ir\.|dr\.|prof\.|ing\.)\s*/i, '');
      if(n2.length > 2 && n2.length < 50 && result.namen.indexOf(n2) < 0) result.namen.push(n2);
    }
  });

  return result;
}

  { key: 'instantie', vraag: 'Bij welke instantie of organisatie werkt deze persoon? Denk aan een gemeente, ministerie, UWV, Belastingdienst, etc.', placeholder: 'Bijv. Gemeente Amsterdam' },
  { key: 'wat', vraag: 'Wat is er precies gebeurd? Beschrijf de situatie. Noem data als je die weet, en wat er precies is gezegd of gedaan.', placeholder: 'Vertel je verhaal...' },
  { key: 'gevolgen', vraag: 'Wat zijn de gevolgen voor jou of anderen? Financieel, emotioneel, praktisch — alles telt.', placeholder: 'Bijv. Ik heb 6 maanden geen inkomen gehad...' },

function pgMeldenAI(){
  var chatHtml = '';
  _aiChat.forEach(function(msg){
    if(msg.role === 'ai'){
      chatHtml += '<div class="ai-bubble"><span class="mi mi-sm" style="color:var(--blue)">smart_toy</span> ' + esc(msg.text) + '</div>';
    } else {
      chatHtml += '<div class="user-bubble">' + esc(msg.text) + '</div>';
    }
  });

  var inputArea = '';
  if(_aiStep < AI_VRAGEN.length){
    var v = AI_VRAGEN[_aiStep];
    inputArea = '<div style="margin-top:10px">' +
      (v.key === 'wat' || v.key === 'gevolgen' ?
        '<textarea class="ft" id="aiInput" style="min-height:100px" placeholder="' + esc(v.placeholder) + '"></textarea>' :
        '<input class="fi" id="aiInput" placeholder="' + esc(v.placeholder) + '">') +
      '<div style="display:flex;gap:8px;margin-top:8px">' +
        '<button class="btn btn-blue" onclick="aiAntwoord()"><span class="mi mi-sm">send</span> Verstuur</button>' +
        '<button class="btn btn-ghost btn-sm" onclick="aiSkip()">Overslaan</button>' +
      '</div>' +
    '</div>';
  } else {
    inputArea = '<div style="margin-top:14px;text-align:center">' +
      '<div class="card" style="padding:16px;margin-bottom:12px;border-left:3px solid var(--green)">' +
        '<div style="font-size:14px;font-weight:700;color:var(--green);margin-bottom:4px"><span class="mi mi-sm">check_circle</span> Klaar!</div>' +
        '<div style="font-size:13px;color:var(--tx2)">Ik heb alle info. Klik hieronder om je melding te publiceren.</div>' +
      '</div>' +
      '<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">' +
        '<label class="fcheck" style="margin-bottom:8px"><input type="checkbox" id="aiAnoniem" checked> Anoniem melden</label>' +
      '</div>' +
      '<button class="btn btn-red btn-lg" onclick="aiSubmit()"><span class="mi">send</span> Publiceer melding</button>' +
    '</div>';
  }

  return '<div class="page">' +
    '<h2 style="font-size:20px;font-weight:700;margin-bottom:4px"><span class="mi">smart_toy</span> AI helpt je melden</h2>' +
    '<p style="font-size:13px;color:var(--tx2);margin-bottom:16px">Ik stel je een paar vragen en maak er een melding van. Geen stress, gewoon antwoorden.</p>' +
    '<div class="card" style="padding:20px">' +
      '<div id="aiChatBox">' + chatHtml + '</div>' +
      inputArea +
    '</div>' +
    '<div style="text-align:center;padding:12px 0"><button class="btn btn-ghost btn-sm" onclick="go(\'/melden\')">Liever zelf invullen?</button></div>' +
  '</div>';
}

function initAI(){
  if(_aiChat.length === 0 && _aiStep === 0){
    _aiChat.push({ role: 'ai', text: 'Hoi! Ik help je een melding doen. Ik stel je een paar korte vragen. Je kunt altijd overslaan als je iets niet weet.' });
    _aiChat.push({ role: 'ai', text: AI_VRAGEN[0].vraag });
    render();
  }
  // Focus input
  setTimeout(function(){ var inp = document.getElementById('aiInput'); if(inp) inp.focus(); }, 100);
}

function aiAntwoord(){
  var inp = document.getElementById('aiInput');
  if(!inp) return;
  var val = inp.value.trim();
  if(!val){ toast('Typ iets of klik overslaan'); return; }

  var v = AI_VRAGEN[_aiStep];
  _aiData[v.key] = val;
  _aiChat.push({ role: 'user', text: val });
  _aiStep++;

  if(_aiStep < AI_VRAGEN.length){
    _aiChat.push({ role: 'ai', text: AI_VRAGEN[_aiStep].vraag });
  } else {
    _aiChat.push({ role: 'ai', text: 'Top, ik heb alles. Wil je de melding anoniem doen? Dan kun je hem nu publiceren.' });
  }
  render();
  setTimeout(function(){ var inp2 = document.getElementById('aiInput'); if(inp2) inp2.focus(); }, 100);
}

function aiSkip(){
  var v = AI_VRAGEN[_aiStep];
  _aiChat.push({ role: 'user', text: '(overgeslagen)' });
  _aiStep++;

  if(_aiStep < AI_VRAGEN.length){
    _aiChat.push({ role: 'ai', text: AI_VRAGEN[_aiStep].vraag });
  } else {
    _aiChat.push({ role: 'ai', text: 'Goed, ik heb genoeg info. Je kunt je melding nu publiceren.' });
  }
  render();
}

function aiSubmit(){
  var titel = _aiData.titel || (_aiData.wat ? _aiData.wat.substring(0,60) : 'Melding');
  var verhaal = '';
  if(_aiData.wat) verhaal += _aiData.wat;
  if(_aiData.gevolgen) verhaal += '\n\nGevolgen: ' + _aiData.gevolgen;

  // Parse namen
  var namen = [];
  if(_aiData.namen){
    _aiData.namen.split(',').forEach(function(n){
      var parts = n.trim().split(/\s*[-–]\s*/);
      namen.push({ naam: (parts[0]||'').trim(), functie: (parts[1]||'').trim() });
    });
  }

  var anoniem = (document.getElementById('aiAnoniem')||{}).checked !== false;

  var melding = {
    titel: titel.trim(),
    verhaal: verhaal.trim(),
    instantie: (_aiData.instantie || '').trim(),
    namen: namen.filter(function(n){ return n.naam; }),
    anoniem: anoniem,
    melder_naam: null,
    melder_email: null,
    klokkenluider: false,
    ts: Date.now(),
    views: 0
  };

  API.submitMelding(melding, function(err, data){
    if(err){ toast('Fout bij indienen: ' + err); return; }
    toonClaimCode(data.claimCode, data.id, data.status);
    _aiChat = []; _aiStep = 0; _aiData = {};
  });
}

// ============ PAGE: NAMEN OVERZICHT ============
function pgNamen(){
  var namen = getNamenLijst();

  var listHtml = '';
  if(namen.length === 0){
    listHtml = '<div class="empty"><span class="mi">people</span><p>Nog geen namen. Doe een melding om het overzicht te vullen.</p></div>';
  } else {
    listHtml = '<div class="card-grid">';
    namen.forEach(function(n){
      var kleur = n.count >= 3 ? 'var(--accent)' : (n.count >= 2 ? 'var(--yellow)' : 'var(--tx3)');
      var orgs = Object.keys(n.instanties).join(', ') || '';
      var feitenList = Object.keys(n.feiten);
      var sanctieList = Object.keys(n.maxSancties);
      listHtml += '<div class="card" style="border-left:3px solid ' + kleur + '">' +
        '<div style="display:flex;justify-content:space-between;align-items:flex-start">' +
          '<div>' +
            '<div style="font-size:15px;font-weight:800">' + esc(n.naam) + '</div>' +
            (n.functie ? '<div style="font-size:12px;color:var(--tx2)">' + esc(n.functie) + '</div>' : '') +
            (orgs ? '<div style="font-size:12px;color:var(--tx3)"><span class="mi mi-sm" style="font-size:12px">business</span> ' + esc(orgs) + '</div>' : '') +
            (n.email ? '<div style="font-size:12px;color:var(--blue);margin-top:2px"><span class="mi mi-sm" style="font-size:12px">email</span> ' + esc(n.email) + '</div>' : '') +
          '</div>' +
          '<div style="text-align:right">' +
            '<div style="font-size:24px;font-weight:800;color:' + kleur + '">' + n.count + '</div>' +
            '<div style="font-size:10px;color:var(--tx3)">melding' + (n.count!==1?'en':'') + '</div>' +
          '</div>' +
        '</div>' +
        // Gemelde feiten per persoon
        (feitenList.length > 0 ? '<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--glass-bd)">' +
          '<div style="font-size:11px;font-weight:700;color:var(--accent);margin-bottom:6px"><span class="mi mi-sm" style="font-size:12px">gavel</span> Gemelde feiten:</div>' +
          feitenList.map(function(fk){
            var f = n.feiten[fk];
            return '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:4px">' +
              '<span style="font-size:11px;color:var(--tx)">' + esc(f.feit) + '</span>' +
              (f.wet ? '<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(59,130,246,.12);color:var(--blue);font-weight:600">' + esc(f.wet) + '</span>' : '') +
              (f.maxSanctie ? '<span style="font-size:9px;padding:2px 6px;border-radius:3px;background:var(--accent);color:#fff;font-weight:700">⚖ ' + esc(f.maxSanctie) + '</span>' : '') +
            '</div>';
          }).join('') +
        '</div>' : '') +
        // Max sancties samenvatting
        (sanctieList.length > 0 ? '<div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap">' +
          '<span style="font-size:10px;font-weight:700;color:var(--accent)">Max sancties:</span>' +
          sanctieList.map(function(s){ return '<span style="font-size:10px;padding:2px 6px;border-radius:3px;background:rgba(239,68,68,.15);color:var(--accent);font-weight:600">' + esc(s) + '</span>'; }).join('') +
        '</div>' : '') +
        '<div style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap">' +
          n.meldingIds.map(function(id){ return '<a href="#/melding/' + id + '" style="font-size:11px">Bekijk</a>'; }).join(' <span style="color:var(--tx3)">&middot;</span> ') +
        '</div>' +
      '</div>';
    });
    listHtml += '</div>';
  }

  var herhalers = namen.filter(function(n){ return n.count >= 2; });

  return '<div class="page">' +
    '<h2 style="font-size:20px;font-weight:700;margin-bottom:4px"><span class="mi">people</span> Gemelde ambtenaren</h2>' +
    '<div style="font-size:14px;color:var(--tx);line-height:1.7;margin-bottom:12px;padding:14px;background:var(--accent-soft);border:1px solid rgba(239,68,68,.2);border-radius:var(--rs)">' +
      '<strong style="color:var(--accent)">Waarom publiceren wij namen?</strong><br>' +
      'Ambtenaren die betrokken zijn bij het toeslagenschandaal gaan nog steeds door. Dossiers worden getraineerd, bezwaren genegeerd, slachtoffers weggestuurd. ' +
      'Deze pagina publiceert de <strong>namen, functies en e-mailadressen</strong> van gemelde ambtenaren — met de specifieke feiten en maximale sancties die daarop staan. ' +
      'Niet uit wraak, maar zodat er verantwoording komt en patronen zichtbaar worden.' +
    '</div>' +
    '<div style="font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:12px;padding:12px;background:var(--bg3);border-radius:var(--rs);border:1px solid var(--glass-bd)">' +
      '<span class="mi mi-sm" style="color:var(--blue)">info</span> <strong>Wat wordt hier getoond:</strong> per gemelde ambtenaar zie je het aantal meldingen, de organisatie(s), de specifieke feiten die bij deze persoon zijn gemeld, en de maximale strafrechtelijke sanctie per feit. ' +
      'Namen die meerdere keren voorkomen wijzen op <strong>structureel gedrag</strong>.' +
    '</div>' +

    (herhalers.length > 0 ? '<div class="card" style="border-left:3px solid var(--accent);margin-bottom:14px;background:var(--accent-soft)">' +
      '<div style="font-size:14px;font-weight:700;color:var(--accent)"><span class="mi mi-sm">warning</span> ' + herhalers.length + ' naam/namen bij meerdere meldingen</div>' +
      '<div style="font-size:12px;color:var(--tx2)">Dit zijn geen incidenten. Dit zijn patronen.</div>' +
    '</div>' : '') +

    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">' +
      '<div class="card" style="text-align:center;padding:14px"><div style="font-size:22px;font-weight:800">' + namen.length + '</div><div style="font-size:10px;color:var(--tx3)">UNIEKE NAMEN</div></div>' +
      '<div class="card" style="text-align:center;padding:14px"><div style="font-size:22px;font-weight:800;color:var(--accent)">' + herhalers.length + '</div><div style="font-size:10px;color:var(--tx3)">HERHALERS (2+)</div></div>' +
      '<div class="card" style="text-align:center;padding:14px"><div style="font-size:22px;font-weight:800;color:var(--yellow)">' + namen.filter(function(n){return n.count>=3;}).length + '</div><div style="font-size:10px;color:var(--tx3)">ROOD ALARM (3+)</div></div>' +
    '</div>' +

    listHtml +
  '</div>';
}

          '<input class="fi" id="klNaam0" placeholder="Naam (mag ook initialen/functie)">' +

        '</div>' +
      '</div>' +

      '<div class="fg"><label class="fl">Wat heb je gezien?</label><textarea class="ft" id="klVerhaal" style="min-height:160px" placeholder="Beschrijf wat er gebeurt. Noem feiten, geen geruchten. Hoe specifieker, hoe beter.\n\nJe hoeft geen lang verhaal te schrijven — een paar zinnen is ook goed."></textarea></div>' +
      '<div class="fg"><label class="fl">Titel</label><input class="fi" id="klTitel" placeholder="Korte omschrijving"></div>' +

      '<button class="btn btn-purple btn-lg" onclick="submitKlokkenluider()" style="width:100%"><span class="mi">shield</span> Anoniem publiceren</button>' +

var _klNaamCount = 1;
function klVoegNaamToe(){
  var c = document.getElementById('klNamen');
  if(!c) return;
  var i = _klNaamCount++;
  var div = document.createElement('div');
  div.style = 'display:flex;gap:8px;margin-bottom:8px';
  div.innerHTML = '<input class="fi" id="klNaam' + i + '" placeholder="Naam"><input class="fi" id="klFunc' + i + '" placeholder="Functie" style="flex:.7">';
  c.appendChild(div);
}

function submitKlokkenluider(){
  var namen = [];
  for(var i = 0; i < 20; i++){
    var nEl = document.getElementById('klNaam'+i);
    var fEl = document.getElementById('klFunc'+i);
    if(nEl && nEl.value.trim()) namen.push({ naam: nEl.value.trim(), functie: (fEl?fEl.value.trim():'') });
  }
  var titel = (document.getElementById('klTitel')||{}).value || '';
  var verhaal = (document.getElementById('klVerhaal')||{}).value || '';
  var instantie = (document.getElementById('klInst')||{}).value || '';

  if(!verhaal.trim() && namen.length === 0){ toast('Vul iets in'); return; }
  if(!titel.trim()) titel = 'Klokkenluider-melding' + (instantie ? ' over ' + instantie : '');

  var melding = {
    titel: titel.trim(),
    verhaal: verhaal.trim(),
    instantie: instantie.trim(),
    namen: namen,
    anoniem: true,
    melder_naam: null,
    melder_email: null,
    klokkenluider: true,
    ts: Date.now(),
    views: 0
  };

  API.submitMelding(melding, function(err, data){
    if(err){ toast('Fout bij indienen: ' + err); return; }
    toonClaimCode(data.claimCode, data.id, data.status);
    _klNaamCount = 1;
  });
}
