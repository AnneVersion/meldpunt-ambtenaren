server {
    listen 80;
    server_name _DOMAIN_ www._DOMAIN_;

    # Redirect naar HTTPS (wordt actief na certbot)
    # location / { return 301 https://$host$request_uri; }

    # Tijdelijk: serveer direct op HTTP totdat SSL klaar is
    root /opt/meldpunt/frontend;

    # Statische bestanden
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API doorsturen naar Flask/Gunicorn
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        # Rate limiting op nginx niveau
        # limit_req zone=api burst=20 nodelay;
    }

    # Data map blokkeren
    location /data/ {
        deny all;
        return 404;
    }

    location /backend/ {
        deny all;
        return 404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/meldpunt_access.log;
    error_log /var/log/nginx/meldpunt_error.log;
}
